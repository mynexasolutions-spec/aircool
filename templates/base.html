<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Air Cool Tech Services{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'partials/navbar.html' %}

  {% block content %}{% endblock %}

  {% include 'partials/footer.html' %}

  <script>
    // Hero slider
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.dot');
    if (slides.length && dots.length) {
      let current = 0;
      let timer;

      window.goToSlide = function(idx) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = idx;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
        clearInterval(timer);
        timer = setInterval(nextSlide, 3000);
      };

      function nextSlide() { goToSlide((current + 1) % slides.length); }
      timer = setInterval(nextSlide, 3000);
    }

    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    if (hamburger) {
      hamburger.addEventListener('click', () => {
        const nav = document.querySelector('.nav-links');
        if (nav.style.display === 'flex') {
          nav.style.display = 'none';
        } else {
          nav.style.cssText = 'display:flex;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:white;padding:20px 5%;gap:16px;box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:99;';
        }
      });
    }
  </script>
  {% block extra_js %}{% endblock %}

  <!-- FLOATING CONTACT ICONS -->
  <div class="floating-contact">
    <a href="https://wa.me/91XXXXXXXXXX" class="floating-icon whatsapp" target="_blank" title="WhatsApp Us">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
    </a>
    <a href="tel:+91XXXXXXXXXX" class="floating-icon phone" title="Call Us">
        <div class="phone-icon-wrap">📞</div>
    </a>
  </div>
</body>
</html>

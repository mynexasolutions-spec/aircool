<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Air Cool Tech Services{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'partials/navbar.html' %}

  {% block content %}{% endblock %}

  {% include 'partials/footer.html' %}

  <script>
    // Hero slider
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.dot');
    if (slides.length && dots.length) {
      let current = 0;
      let timer;

      window.goToSlide = function(idx) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = idx;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
        clearInterval(timer);
        timer = setInterval(nextSlide, 3000);
      };

      function nextSlide() { goToSlide((current + 1) % slides.length); }
      timer = setInterval(nextSlide, 3000);
    }

    // Hamburger & Dropdown logic
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    
    if (hamburger) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('nav-active');
        hamburger.classList.toggle('toggle');
      });
    }

    // Toggle dropdowns in mobile
    const dropdownLinks = document.querySelectorAll('.dropdown > a');
    dropdownLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        if (window.innerWidth <= 1024) {
          e.preventDefault();
          const menu = link.nextElementSibling;
          if (menu) {
            const isOpen = menu.style.display === 'flex';
            menu.style.display = isOpen ? 'none' : 'flex';
            menu.style.flexDirection = 'column';
          }
        }
      });
    });
  </script>
  {% block extra_js %}{% endblock %}

  <!-- FLOATING CONTACT ICONS -->
  <div class="floating-contact">
    <a href="https://wa.me/918630872674" class="floating-icon whatsapp" target="_blank" title="WhatsApp Us">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
    </a>
    <a href="tel:+918630872674" class="floating-icon phone" title="Call Us">
        <div class="phone-icon-wrap">📞</div>
    </a>
  </div>
</body>
</html>
